<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F6F4EF" />
    <title>聊天 离线</title>
    <style>
      :root {
        --bg: #f6f4ef;
        --outer: #d1ccc3;
        --paper: #fbf8f1;
        --text: #1d1d1d;
        --muted: #746b5f;
        --border: #e5e0d8;
        --accent: #c59482;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100dvh;
        place-items: center;
        margin: 0;
        background: var(--outer);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        width: min(390px, 100vw);
        min-height: min(844px, 100dvh);
        place-items: center;
        background: var(--bg);
        padding: 32px;
      }

      section {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(251, 248, 241, 0.76);
        padding: 28px;
      }

      p:first-child {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.05;
      }

      p:last-child {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      @media (max-width: 430px) {
        body {
          background: var(--bg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p>OFFLINE</p>
        <h1>聊天暂时离线</h1>
        <p>已缓存的页面仍可打开。重新连接网络后，新的头像、字体和远程资源会继续同步。</p>
      </section>
    </main>
  </body>
</html>
